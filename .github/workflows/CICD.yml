name: Deploy Multi-K8s to AWS EKS
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. AUTHENTICATE WITH AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change to your EKS region

      # 2. LOGIN TO DOCKER HUB
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. BUILD & TEST CLIENT
      - name: Build and Test
        run: |
          docker build -t singhayush61/react-test -f ./client/Dockerfile.dev ./client
          docker run -e CI=true singhayush61/react-test npm test

      # 4. BUILD & PUSH PROD IMAGES (Multi-Tag)
      - name: Build and Push
        run: |
          # Build with both 'latest' and the 'commit SHA'
          docker build -t singhayush61/multi-client:latest -t singhayush61/multi-client:${{ github.sha }} ./client
          docker build -t singhayush61/multi-server:latest -t singhayush61/multi-server:${{ github.sha }} ./server
          docker build -t singhayush61/multi-worker:latest -t singhayush61/multi-worker:${{ github.sha }} ./worker
          
          docker push singhayush61/multi-client --all-tags
          docker push singhayush61/multi-server --all-tags
          docker push singhayush61/multi-worker --all-tags

      # 5. CONNECT TO EKS
      - name: Setup Kubeconfig
        run: |
          aws eks update-kubeconfig --name multi-cluster --region us-east-1

      # 6. IMPERATIVE DEPLOYMENT
      - name: Deploy to Cluster
        run: |
          kubectl apply -f k8s/
          kubectl set image deployments/server-deployment server=singhayush61/multi-server:${{ github.sha }}
          kubectl set image deployments/client-deployment client=singhayush61/multi-client:${{ github.sha }}
          kubectl set image deployments/worker-deployment worker=singhayush61/multi-worker:${{ github.sha }}
